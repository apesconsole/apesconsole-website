name: Deploy Portfolio to GitHub Pages

# Static site — no build step. On every push to master, the site files are
# assembled into a clean folder and published via GitHub's native Pages
# deployment (the "github-pages" environment). This never pushes to any
# branch, so branch protection rulesets do not block deploys.
on:
  push:
    branches: ["master"]
  workflow_dispatch: {}     # allow manual re-deploys from the Actions tab

# Native Pages deploy needs pages:write + id-token:write; contents stays read-only.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='_site' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            ./ ./_site/
          # Preserve the custom domain for GitHub Pages.
          echo "www.apesconsole.com" > _site/CNAME
          ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
