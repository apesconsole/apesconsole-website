name: Deploy Portfolio to GitHub Pages

# Static site — no build step. On every push to master, the site files are
# copied into a clean folder and published to the gh-pages branch, which
# GitHub Pages serves at the custom domain.
on:
  push:
    branches: ["master"]
  workflow_dispatch: {}     # allow manual re-deploys from the Actions tab

permissions:
  contents: write           # allow GITHUB_TOKEN to push to gh-pages

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='_site' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            ./ ./_site/
          ls -la _site

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          cname: www.apesconsole.com
